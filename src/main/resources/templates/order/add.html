<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление заказа | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: auto;
            margin: 0;
            padding: 20px;
        }

        /* Фоновые элементы */
        .bg-blur-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .bg-circle-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, rgba(111,240,165,0.25), transparent); animation: floatSoft1 22s ease-in-out infinite; }
        .bg-circle-2 { width: 550px; height: 550px; bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(111,240,165,0.2), transparent); animation: floatSoft2 25s ease-in-out infinite; }
        .bg-circle-3 { width: 450px; height: 450px; top: 60%; left: 10%; background: radial-gradient(circle, rgba(111,240,165,0.15), transparent); animation: floatSoft3 28s ease-in-out infinite; }
        .bg-circle-4 { width: 500px; height: 500px; bottom: 20%; right: 20%; background: radial-gradient(circle, rgba(111,240,165,0.18), transparent); animation: floatSoft4 24s ease-in-out infinite reverse; }

        @keyframes floatSoft1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,-40px) scale(1.08); } 66% { transform: translate(-30px,30px) scale(0.95); } }
        @keyframes floatSoft2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-35px,-30px) scale(1.05); } 66% { transform: translate(25px,35px) scale(0.98); } }
        @keyframes floatSoft3 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(45px,25px) scale(1.1); } 66% { transform: translate(-25px,-35px) scale(0.92); } }
        @keyframes floatSoft4 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-40px,35px) scale(1.03); } 66% { transform: translate(30px,-25px) scale(0.97); } }

        .soft-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.2) 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(111,240,165,0.4);
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        .star-medium { width: 3px; height: 3px; background: rgba(111,240,165,0.5); animation-duration: 4s; }
        .star-large { width: 4px; height: 4px; background: rgba(111,240,165,0.6); animation-duration: 5s; }
        @keyframes starTwinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.3); } }

        .form-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 35px;
            background: rgba(37, 39, 43, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .form-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(111, 240, 165, 0); }
        }

        .form-icon i {
            font-size: 32px;
            color: var(--night-dark);
        }

        .form-header h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-header p {
            font-size: 0.85rem;
            color: var(--off-white);
            opacity: 0.7;
            margin: 0;
        }

        .order-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .order-section h3 {
            color: var(--neon-green);
            font-size: 1.2rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(111, 240, 165, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            font-weight: 500;
            color: var(--off-white);
            margin-bottom: 6px;
            display: block;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-size: 14px;
            z-index: 2;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 10px 40px 10px 40px;
            background: rgba(37, 39, 43, 0.9);
            border: 2px solid rgba(111, 240, 165, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-size: 14px;
            transition: all var(--transition-normal);
        }

        .form-control:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(111, 240, 165, 0.2);
        }

        select.form-control {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236ff0a5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        select.form-control option {
            background: var(--night-dark);
            color: var(--white);
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .items-table th {
            color: var(--neon-green);
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(111, 240, 165, 0.3);
        }

        .items-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(111, 240, 165, 0.1);
            color: var(--off-white);
        }

        .quantity-input {
            width: 80px;
            padding: 6px;
            background: rgba(37, 39, 43, 0.9);
            border: 1px solid rgba(111, 240, 165, 0.3);
            border-radius: 6px;
            color: var(--white);
            text-align: center;
        }

        .btn-remove {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-remove:hover {
            background: var(--danger);
            color: var(--white);
        }

        .btn-add-item {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-add-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
        }

        .total-price {
            text-align: right;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--neon-green);
            padding: 15px 0;
            border-top: 1px solid rgba(111, 240, 165, 0.3);
            margin-top: 20px;
        }

        .empty-items {
            text-align: center;
            color: var(--off-white);
            opacity: 0.7;
            padding: 30px;
        }

        .form-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            transition: all var(--transition-normal);
            cursor: pointer;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(111, 240, 165, 0.3);
            color: var(--off-white);
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all var(--transition-normal);
            text-decoration: none;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            transform: translateX(3px);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .form-container {
                padding: 25px;
            }

            .row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .form-buttons {
                flex-direction: column;
                gap: 12px;
            }

            .form-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<!-- Фоновые элементы -->
<div class="bg-blur-circle bg-circle-1"></div>
<div class="bg-blur-circle bg-circle-2"></div>
<div class="bg-blur-circle bg-circle-3"></div>
<div class="bg-blur-circle bg-circle-4"></div>
<div class="stars" id="stars"></div>
<div class="soft-glow"></div>

<div class="form-container">
    <div class="form-header">
        <div class="form-icon">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <h1>Добавление заказа</h1>
        <p>Создайте новый заказ</p>
    </div>

    <form th:action="@{/orders/add}" th:object="${orderDto}" method="post" id="orderForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="order-section">
            <h3><i class="fas fa-info-circle"></i> Основная информация</h3>
            <div class="row">
                <div class="form-group">
                    <label for="userID">Пользователь *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <select class="form-control" id="userID" th:field="*{userID}" required>
                            <option value="">-- Выберите пользователя --</option>
                            <option th:each="user : ${listUsers}"
                                    th:value="${user.id}"
                                    th:text="${user.username + ' (' + user.email + ')'}">
                            </option>
                        </select>
                    </div>
                    <div th:if="${#fields.hasErrors('userID')}" class="text-danger">
                        <span th:errors="*{userID}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">Статус заказа *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-truck input-icon"></i>
                        <select class="form-control" id="status" th:field="*{status}" required>
                            <option value="pending">⏳ Ожидает оплаты</option>
                            <option value="processing">🔄 В обработке</option>
                            <option value="completed">✅ Завершен</option>
                            <option value="cancelled">❌ Отменен</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="paymentMethod">Способ оплаты *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-credit-card input-icon"></i>
                        <select class="form-control" id="paymentMethod" th:field="*{paymentMethod}" required>
                            <option value="По карте">💳 По карте</option>
                            <option value="Наличными">💵 Наличными</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="deliveryMethod">Способ доставки *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-box input-icon"></i>
                        <select class="form-control" id="deliveryMethod" th:field="*{deliveryMethod}" required>
                            <option value="В постомат">📦 В постомат</option>
                            <option value="По адресу">🚚 По адресу</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="order-section">
            <h3><i class="fas fa-boxes"></i> Товары в заказе</h3>

            <div id="itemsContainer">
                <table class="items-table" id="itemsTable" style="display: none;">
                    <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Количество</th>
                        <th>Цена</th>
                        <th>Сумма</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="itemsTableBody"></tbody>
                </table>
                <div id="emptyMessage" class="empty-items">
                    <i class="fas fa-shopping-cart fa-2x mb-3"></i>
                    <p>Нет товаров в заказе. Добавьте товары ниже.</p>
                </div>
            </div>

            <!-- Форма добавления товара -->
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(111,240,165,0.2);">
                <div class="row">
                    <div class="form-group">
                        <label for="productSelect">Товар *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-box input-icon"></i>
                            <select class="form-control" id="productSelect">
                                <option value="">-- Выберите товар --</option>
                                <option th:each="product : ${listProducts}"
                                        th:value="${product.id}"
                                        th:data-price="${product.price}"
                                        th:text="${product.name + ' (' + product.price + ' ₽)'}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="quantityInput">Количество *</label>
                        <div class="input-wrapper">
                            <i class="fas fa-hashtag input-icon"></i>
                            <input type="number" class="form-control quantity-input" id="quantityInput" value="1" min="1" style="padding-left: 40px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Цена</label>
                        <div class="input-wrapper">
                            <i class="fas fa-ruble-sign input-icon"></i>
                            <div class="form-control" id="priceDisplay" style="background: rgba(37,39,43,0.9); display: flex; align-items: center;">0 ₽</div>
                        </div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="button" class="btn-add-item" onclick="addItem()" style="width: 100%;">
                            <i class="fas fa-plus"></i> Добавить
                        </button>
                    </div>
                </div>
            </div>

            <div class="total-price">
                Итоговая сумма: <span id="totalPriceDisplay">0 ₽</span>
            </div>
            <input type="hidden" id="totalPrice" th:field="*{totalPrice}">
            <input type="hidden" id="orderItems" name="orderItems">
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Создать заказ
            </button>
            <a href="/orders" class="btn-back">
                <i class="fas fa-arrow-left"></i> Назад
            </a>
        </div>
    </form>
</div>

<script>
    let items = [];
    let itemCounter = 0;

    document.getElementById('productSelect').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const price = selectedOption.getAttribute('data-price') || '0';
        document.getElementById('priceDisplay').textContent = parseFloat(price).toFixed(2) + ' ₽';
    });

    function addItem() {
        const productSelect = document.getElementById('productSelect');
        const quantityInput = document.getElementById('quantityInput');

        const productId = productSelect.value;
        const productName = productSelect.options[productSelect.selectedIndex].text.split(' (')[0];
        const price = parseFloat(productSelect.options[productSelect.selectedIndex].getAttribute('data-price'));
        const quantity = parseInt(quantityInput.value);

        if (!productId) {
            alert('Пожалуйста, выберите товар');
            return;
        }

        if (quantity < 1) {
            alert('Количество должно быть больше 0');
            return;
        }

        const existingItemIndex = items.findIndex(item => item.productId === productId);
        if (existingItemIndex > -1) {
            items[existingItemIndex].quantity += quantity;
            updateItemsTable();
        } else {
            const item = {
                id: itemCounter++,
                productId: productId,
                productName: productName,
                price: price,
                quantity: quantity,
                total: price * quantity
            };
            items.push(item);
            updateItemsTable();
        }

        productSelect.value = '';
        quantityInput.value = '1';
        document.getElementById('priceDisplay').textContent = '0 ₽';
    }

    function removeItem(itemId) {
        items = items.filter(item => item.id !== itemId);
        updateItemsTable();
    }

    function updateQuantity(itemId, newQuantity) {
        const item = items.find(item => item.id === itemId);
        if (item && newQuantity > 0) {
            item.quantity = parseInt(newQuantity);
            item.total = item.price * item.quantity;
            updateItemsTable();
        }
    }

    function updateItemsTable() {
        const tableBody = document.getElementById('itemsTableBody');
        const emptyMessage = document.getElementById('emptyMessage');
        const table = document.getElementById('itemsTable');

        tableBody.innerHTML = '';

        if (items.length === 0) {
            table.style.display = 'none';
            emptyMessage.style.display = 'block';
        } else {
            table.style.display = 'table';
            emptyMessage.style.display = 'none';

            items.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                        <td>${item.productName}</td>
                        <td><input type="number" class="quantity-input" value="${item.quantity}" min="1" onchange="updateQuantity(${item.id}, this.value)"></td>
                        <td>${item.price.toFixed(2)} ₽</td>
                        <td>${item.total.toFixed(2)} ₽</td>
                        <td><button type="button" class="btn-remove" onclick="removeItem(${item.id})"><i class="fas fa-trash"></i></button></td>
                    `;
                tableBody.appendChild(row);
            });
        }

        updateTotalPrice();
        updateHiddenFields();
    }

    function updateTotalPrice() {
        const total = items.reduce((sum, item) => sum + item.total, 0);
        document.getElementById('totalPriceDisplay').textContent = total.toFixed(2) + ' ₽';
        document.getElementById('totalPrice').value = total.toFixed(2);
    }

    function updateHiddenFields() {
        const orderItems = items.map(item => ({
            productID: item.productId,
            quantity: item.quantity
        }));
        document.getElementById('orderItems').value = JSON.stringify(orderItems);
    }

    document.getElementById('orderForm').addEventListener('submit', function(event) {
        if (items.length === 0) {
            event.preventDefault();
            alert('Добавьте хотя бы один товар в заказ');
            return;
        }
        updateHiddenFields();
    });

    function addBackgroundElements() {
        if (!document.querySelector('.bg-blur-circle')) {
            const circles = [
                { className: 'bg-circle-1', size: 600, top: -200, left: -200 },
                { className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
                { className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
                { className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
            ];
            circles.forEach(circle => {
                const div = document.createElement('div');
                div.className = `bg-blur-circle ${circle.className}`;
                if (circle.size) div.style.width = `${circle.size}px`;
                if (circle.size) div.style.height = `${circle.size}px`;
                if (circle.top) div.style.top = circle.top;
                if (circle.left) div.style.left = circle.left;
                if (circle.bottom) div.style.bottom = circle.bottom;
                if (circle.right) div.style.right = circle.right;
                document.body.appendChild(div);
            });
        }
        if (!document.querySelector('.soft-glow')) {
            const glow = document.createElement('div');
            glow.className = 'soft-glow';
            document.body.appendChild(glow);
        }
        if (!document.querySelector('.stars')) {
            const stars = document.createElement('div');
            stars.className = 'stars';
            stars.id = 'stars';
            document.body.appendChild(stars);
        }
    }

    function createStars() {
        const container = document.getElementById('stars');
        if (!container) return;
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            const rand = Math.random();
            star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        addBackgroundElements();
        createStars();
        updateItemsTable();
    });
</script>
</body>
</html>
