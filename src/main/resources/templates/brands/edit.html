<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Редактирование бренда | TechStore</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<style>/* те же стили, что и для add.html */</style>
</head>
<body>
<div class="form-container">
	<div class="form-header">
		<div class="form-icon"><i class="fas fa-edit"></i></div>
		<h1>Редактирование бренда</h1>
		<p>Измените название бренда</p>
	</div>

	<div th:if="${param.error}" class="alert alert-danger">
		<i class="fas fa-exclamation-triangle"></i> <span th:text="${param.error}"></span>
	</div>

	<form th:action="@{'/brands/edit/' + ${brand.id}}" th:object="${brand}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

		<div class="form-group">
			<label for="name">Название бренда *</label>
			<div class="input-wrapper">
				<i class="fas fa-tag input-icon"></i>
				<input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Например: Apple, Samsung, Xiaomi" required>
			</div>
		</div>

		<div class="form-buttons">
			<button type="submit" class="btn-submit"><i class="fas fa-save"></i> Сохранить</button>
			<a href="/brands" class="btn-back"><i class="fas fa-arrow-left"></i> Отмена</a>
		</div>
	</form>
</div>

<script>
	function addBackgroundElements() {
		if (!document.querySelector('.bg-blur-circle')) {
			const circles = [
				{ className: 'bg-circle-1', size: 600, top: -200, left: -200 },
				{ className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
				{ className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
				{ className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
			];
			circles.forEach(circle => {
				const div = document.createElement('div');
				div.className = `bg-blur-circle ${circle.className}`;
				if (circle.size) div.style.width = `${circle.size}px`;
				if (circle.size) div.style.height = `${circle.size}px`;
				if (circle.top) div.style.top = circle.top;
				if (circle.left) div.style.left = circle.left;
				if (circle.bottom) div.style.bottom = circle.bottom;
				if (circle.right) div.style.right = circle.right;
				document.body.appendChild(div);
			});
		}
		if (!document.querySelector('.soft-glow')) {
			const glow = document.createElement('div');
			glow.className = 'soft-glow';
			document.body.appendChild(glow);
		}
		if (!document.querySelector('.stars')) {
			const stars = document.createElement('div');
			stars.className = 'stars';
			stars.id = 'stars';
			document.body.appendChild(stars);
		}
	}

	function createStars() {
		const container = document.getElementById('stars');
		if (!container) return;
		for (let i = 0; i < 80; i++) {
			const star = document.createElement('div');
			const rand = Math.random();
			star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
			star.style.left = Math.random() * 100 + '%';
			star.style.top = Math.random() * 100 + '%';
			star.style.animationDelay = Math.random() * 5 + 's';
			container.appendChild(star);
		}
	}

	document.addEventListener('DOMContentLoaded', function() {
		addBackgroundElements();
		createStars();

		// Автофокус на поле ввода
		document.getElementById('name').focus();
	});Ф
</script>
</body>
</html>
