<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Заказ оформлен | ТехноШок</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
	<style>
		body {
			background: var(--night-dark);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.success-wrapper {
			max-width: 500px;
			margin: 0 auto;
			padding: 20px;
		}
		.success-card {
			background: rgba(37, 39, 43, 0.9);
			border-radius: 24px;
			padding: 40px;
			text-align: center;
			border: 1px solid rgba(111, 240, 165, 0.2);
		}
		.success-icon {
			font-size: 80px;
			color: var(--neon-green);
			margin-bottom: 20px;
		}
		.success-title {
			font-size: 1.8rem;
			color: var(--white);
			margin-bottom: 10px;
		}
		.success-message {
			color: var(--off-white);
			opacity: 0.8;
			margin-bottom: 20px;
		}
		.order-id {
			background: rgba(111, 240, 165, 0.1);
			padding: 10px;
			border-radius: 12px;
			margin: 20px 0;
		}
		.order-id span {
			color: var(--neon-green);
			font-weight: bold;
			font-size: 1.2rem;
		}
		.status-badge {
			display: inline-block;
			padding: 6px 14px;
			border-radius: 20px;
			font-size: 0.85rem;
			font-weight: 600;
			margin: 15px 0;
		}
		.status-paid {
			background: rgba(46, 204, 113, 0.2);
			color: #2ecc71;
		}
		.status-pending {
			background: rgba(241, 196, 15, 0.2);
			color: #f1c40f;
		}
		.btn-success {
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			color: var(--night-dark);
			border: none;
			padding: 12px 30px;
			border-radius: 30px;
			font-weight: bold;
			margin-top: 20px;
		}
		.btn-success:hover {
			transform: translateY(-2px);
			box-shadow: var(--shadow-neon);
		}
	</style>
</head>
<body>
<div class="success-wrapper">
	<div class="success-card">
		<div class="success-icon">
			<i class="fas fa-check-circle"></i>
		</div>
		<h1 class="success-title">Заказ успешно оформлен!</h1>
		<p class="success-message">Спасибо за покупку</p>

		<div class="order-id">
			Номер заказа: <span th:text="${orderId}"></span>
		</div>

		<div>
            <span class="status-badge" th:classappend="${orderStatus == 'PAID' ? 'status-paid' : 'status-pending'}"
				  th:text="${status}"></span>
		</div>

		<a href="/users/profile" class="btn btn-secondary" style="margin-left: 10px;">
			<i class="fas fa-user"></i> Мои заказы
		</a>
	</div>
</div>
</body>
</html>
