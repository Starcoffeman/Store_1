<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказы | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        body {
            background: var(--night-dark);
            min-height: 100vh;
            padding: 20px;
        }

        .orders-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(37, 39, 43, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            padding: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .orders-header h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .orders-header h1 i {
            color: var(--neon-green);
            background: none;
            -webkit-background-clip: unset;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all var(--transition-normal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
            color: var(--night-dark);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: var(--off-white);
            border: 1px solid rgba(111, 240, 165, 0.3);
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all var(--transition-normal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            transform: translateX(3px);
        }

        .table {
            color: var(--off-white);
            margin-bottom: 25px;
            border-radius: 16px;
            overflow: hidden;
        }

        .table thead {
            background: rgba(0, 0, 0, 0.3);
        }

        .table thead th {
            color: var(--neon-green);
            font-weight: 600;
            border-bottom: 2px solid rgba(111, 240, 165, 0.3);
            padding: 12px;
        }

        .table tbody tr {
            transition: all var(--transition-fast);
            border-bottom: 1px solid rgba(111, 240, 165, 0.1);
        }

        .table tbody tr:hover {
            background: rgba(111, 240, 165, 0.05);
        }

        .table td {
            padding: 12px;
            vertical-align: middle;
        }

        .order-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-processing {
            background: rgba(0, 123, 255, 0.2);
            color: #007bff;
        }

        .status-completed {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }

        .status-cancelled {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .btn-edit {
            background: rgba(111, 240, 165, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 8px;
        }

        .btn-edit:hover {
            background: var(--neon-green);
            color: var(--night-dark);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-view {
            background: rgba(111, 240, 165, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: var(--neon-green);
            color: var(--night-dark);
            transform: translateY(-2px);
        }

        .actions-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--off-white);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--neon-green);
            opacity: 0.5;
            margin-bottom: 15px;
        }

        .order-price {
            color: var(--neon-green);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .orders-container {
                padding: 20px;
            }

            .orders-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .table {
                font-size: 0.85rem;
            }

            .table td, .table th {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
<div class="orders-container">
    <div class="orders-header">
        <h1>
            <i class="fas fa-shopping-cart"></i>
            Управление заказами
        </h1>
        <div style="display: flex; gap: 10px;">
            <a href="/orders/add" class="btn-add">
                <i class="fas fa-plus-circle"></i> Добавить заказ
            </a>
            <a href="/admin" class="btn-back">
                <i class="fas fa-arrow-left"></i> Назад
            </a>
        </div>
    </div>

    <div th:if="${listOrders != null and !listOrders.isEmpty()}">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Дата заказа</th>
                    <th>Статус</th>
                    <th>Способ оплаты</th>
                    <th>Способ доставки</th>
                    <th>Сумма</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order: ${listOrders}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="${order.userID}">Пользователь</td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2024</td>
                    <td>
                            <span class="order-status"
                                  th:classappend="${order.status == 'completed' ? 'status-completed' : (order.status == 'pending' ? 'status-pending' : (order.status == 'cancelled' ? 'status-cancelled' : 'status-processing'))}"
                                  th:text="${order.status == 'completed' ? 'Завершен' : (order.status == 'pending' ? 'Ожидает' : (order.status == 'cancelled' ? 'Отменен' : 'В обработке'))}">
                            </span>
                    </td>
                    <td th:text="${order.paymentMethod}">Карта</td>
                    <td th:text="${order.deliveryMethod}">Доставка</td>
                    <td class="order-price" th:text="|${order.totalPrice} ₽|">1000 ₽</td>
                    <td>
                        <div class="actions-group">
                            <a th:href="@{'/orders/view/' + ${order.id}}" class="btn-view">
                                <i class="fas fa-eye"></i> Просмотр
                            </a>
                            <a th:href="@{'/orders/edit/' + ${order.id}}" class="btn-edit">
                                <i class="fas fa-edit"></i> Редактировать
                            </a>
                            <a th:href="@{'/orders/delete/' + ${order.id}}"
                               class="btn-delete"
                               onclick="return confirm('Вы уверены, что хотите удалить заказ #${order.id}?')">
                                <i class="fas fa-trash-alt"></i> Удалить
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${listOrders == null or listOrders.isEmpty()}" class="empty-state">
        <i class="fas fa-shopping-bag"></i>
        <h3>Нет заказов</h3>
        <p>Нажмите "Добавить заказ", чтобы создать первый заказ</p>
    </div>
</div>

<script>
    function addBackgroundElements() {
        if (!document.querySelector('.bg-blur-circle')) {
            const circles = [
                { className: 'bg-circle-1', size: 600, top: -200, left: -200 },
                { className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
                { className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
                { className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
            ];
            circles.forEach(circle => {
                const div = document.createElement('div');
                div.className = `bg-blur-circle ${circle.className}`;
                if (circle.size) div.style.width = `${circle.size}px`;
                if (circle.size) div.style.height = `${circle.size}px`;
                if (circle.top) div.style.top = circle.top;
                if (circle.left) div.style.left = circle.left;
                if (circle.bottom) div.style.bottom = circle.bottom;
                if (circle.right) div.style.right = circle.right;
                document.body.appendChild(div);
            });
        }
        if (!document.querySelector('.soft-glow')) {
            const glow = document.createElement('div');
            glow.className = 'soft-glow';
            document.body.appendChild(glow);
        }
        if (!document.querySelector('.stars')) {
            const stars = document.createElement('div');
            stars.className = 'stars';
            stars.id = 'stars';
            document.body.appendChild(stars);
        }
    }

    function createStars() {
        const container = document.getElementById('stars');
        if (!container) return;
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            const rand = Math.random();
            star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        addBackgroundElements();
        createStars();
    });
</script>
</body>
</html>
