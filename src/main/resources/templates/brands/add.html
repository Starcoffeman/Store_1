<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Добавление бренда | TechStore</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<style>
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			position: relative;
			overflow: hidden;
		}
		.form-container {
			max-width: 500px;
			width: 90%;
			margin: 20px auto;
			padding: 35px;
			background: rgba(37, 39, 43, 0.85);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			border: 1px solid rgba(111, 240, 165, 0.2);
			position: relative;
			animation: fadeInUp 0.6s ease-out;
		}
		.form-container::before {
			content: '';
			position: absolute;
			top: -2px;
			left: -2px;
			right: -2px;
			bottom: -2px;
			background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
			border-radius: 26px;
			z-index: -1;
			opacity: 0.3;
			animation: borderPulse 3s ease-in-out infinite;
		}
		@keyframes borderPulse {
			0%, 100% { opacity: 0.3; }
			50% { opacity: 0.6; }
		}
		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(30px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.form-header {
			text-align: center;
			margin-bottom: 30px;
		}
		.form-icon {
			width: 70px;
			height: 70px;
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 auto 15px;
			animation: pulse 2s ease-in-out infinite;
		}
		@keyframes pulse {
			0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(111,240,165,0.4); }
			50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(111,240,165,0); }
		}
		.form-icon i { font-size: 32px; color: var(--night-dark); }
		.form-header h1 {
			font-size: 1.6rem;
			margin-bottom: 5px;
			background: linear-gradient(135deg, var(--white), var(--neon-green));
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
		}
		.form-header p { font-size: 0.85rem; color: var(--off-white); opacity: 0.7; }
		.form-group { margin-bottom: 20px; }
		label { font-weight: 500; color: var(--off-white); margin-bottom: 6px; display: block; }
		.input-wrapper { position: relative; }
		.input-icon {
			position: absolute;
			left: 14px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--neon-green);
			font-size: 14px;
		}
		.form-control {
			width: 100%;
			padding: 10px 40px;
			background: rgba(37, 39, 43, 0.9);
			border: 2px solid rgba(111, 240, 165, 0.2);
			border-radius: 10px;
			color: var(--white);
			font-size: 14px;
			transition: all 0.3s ease;
		}
		.form-control:focus {
			border-color: var(--neon-green);
			outline: none;
			box-shadow: 0 0 0 3px rgba(111, 240, 165, 0.2);
		}
		.alert {
			padding: 10px 15px;
			border-radius: 10px;
			margin-bottom: 20px;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.alert-danger { background: rgba(231,76,60,0.2); border: 1px solid #e74c3c; color: #e74c3c; }
		.form-buttons { display: flex; gap: 15px; margin-top: 25px; }
		.btn-submit, .btn-back {
			flex: 1;
			padding: 10px 20px;
			border-radius: 10px;
			font-weight: 600;
			text-decoration: none;
			text-align: center;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			transition: all 0.3s ease;
		}
		.btn-submit {
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			color: var(--night-dark);
			border: none;
			cursor: pointer;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow-neon); }
		.btn-back {
			background: rgba(255,255,255,0.1);
			border: 1px solid rgba(111,240,165,0.3);
			color: var(--off-white);
		}
		.btn-back:hover { background: rgba(111,240,165,0.1); color: var(--neon-green); transform: translateX(3px); }
		@media (max-width: 768px) { .form-container { padding: 25px; } .form-buttons { flex-direction: column; } }
	</style>
</head>
<body>
<div class="form-container">
	<div class="form-header">
		<div class="form-icon"><i class="fas fa-trademark"></i></div>
		<h1>Добавление бренда</h1>
		<p>Введите название нового бренда</p>
	</div>

	<div th:if="${param.error}" class="alert alert-danger">
		<i class="fas fa-exclamation-triangle"></i> <span th:text="${param.error}"></span>
	</div>

	<form th:action="@{/brands/add}" th:object="${brand}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

		<div class="form-group">
			<label for="name">Название бренда *</label>
			<div class="input-wrapper">
				<i class="fas fa-tag input-icon"></i>
				<input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Например: Apple, Samsung, Xiaomi" required>
			</div>
		</div>

		<div class="form-buttons">
			<button type="submit" class="btn-submit"><i class="fas fa-save"></i> Добавить</button>
			<a href="/brands" class="btn-back"><i class="fas fa-arrow-left"></i> Отмена</a>
		</div>
	</form>
</div>

<script>
	function addBackgroundElements() {
		if (!document.querySelector('.bg-blur-circle')) {
			const circles = [
				{ className: 'bg-circle-1', size: 600, top: -200, left: -200 },
				{ className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
				{ className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
				{ className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
			];
			circles.forEach(circle => {
				const div = document.createElement('div');
				div.className = `bg-blur-circle ${circle.className}`;
				if (circle.size) div.style.width = `${circle.size}px`;
				if (circle.size) div.style.height = `${circle.size}px`;
				if (circle.top) div.style.top = circle.top;
				if (circle.left) div.style.left = circle.left;
				if (circle.bottom) div.style.bottom = circle.bottom;
				if (circle.right) div.style.right = circle.right;
				document.body.appendChild(div);
			});
		}
		if (!document.querySelector('.soft-glow')) {
			const glow = document.createElement('div');
			glow.className = 'soft-glow';
			document.body.appendChild(glow);
		}
		if (!document.querySelector('.stars')) {
			const stars = document.createElement('div');
			stars.className = 'stars';
			stars.id = 'stars';
			document.body.appendChild(stars);
		}
	}

	function createStars() {
		const container = document.getElementById('stars');
		if (!container) return;
		for (let i = 0; i < 80; i++) {
			const star = document.createElement('div');
			const rand = Math.random();
			star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
			star.style.left = Math.random() * 100 + '%';
			star.style.top = Math.random() * 100 + '%';
			star.style.animationDelay = Math.random() * 5 + 's';
			container.appendChild(star);
		}
	}

	document.addEventListener('DOMContentLoaded', function() {
		addBackgroundElements();
		createStars();

		// Автофокус на поле ввода
		document.getElementById('name').focus();
	});
</script>
</body>
</html>
