<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>404 - Страница не найдена | ТехноШок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <style>
        body {
            background: var(--night-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
            padding: 50px 30px;
            background: rgba(37, 39, 43, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(111, 240, 165, 0.3);
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-icon {
            font-size: 5rem;
            color: var(--neon-green);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 1.8rem;
            color: var(--white);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .error-message {
            color: var(--off-white);
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition-fast);
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
            color: var(--night-dark);
        }

        .btn-outline-custom {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition-fast);
        }

        .btn-outline-custom:hover {
            background: rgba(111, 240, 165, 0.1);
            transform: translateY(-2px);
            color: var(--neon-green);
        }

        .suggestions {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(111, 240, 165, 0.2);
        }

        .suggestions-title {
            color: var(--off-white);
            font-size: 0.9rem;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .suggestions-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestion-link {
            color: var(--neon-green);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(111, 240, 165, 0.1);
        }

        .suggestion-link:hover {
            background: var(--neon-green);
            color: var(--night-dark);
            transform: translateY(-2px);
        }

        /* Анимация для фона */
        .bg-blur-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        @media (max-width: 768px) {
            .error-container {
                margin: 20px;
                padding: 35px 20px;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.4rem;
            }
            .error-actions {
                flex-direction: column;
            }
            .btn-primary-custom, .btn-outline-custom {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<!-- Фоновые элементы -->
<div class="bg-blur-circle bg-circle-1"></div>
<div class="bg-blur-circle bg-circle-2"></div>
<div class="bg-blur-circle bg-circle-3"></div>
<div class="bg-blur-circle bg-circle-4"></div>
<div class="stars" id="stars"></div>
<div class="soft-glow"></div>

<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-compass"></i>
    </div>
    <div class="error-code" th:text="${errorCode}">404</div>
    <h1 class="error-title" th:text="${errorTitle}">Страница не найдена</h1>
    <p class="error-message" th:text="${errorMessage}">Извините, запрашиваемая страница не существует или была перемещена.</p>

    <div class="error-actions">
        <a href="/" class="btn-primary-custom">
            <i class="fas fa-home"></i> На главную
        </a>
        <a href="javascript:history.back()" class="btn-outline-custom">
            <i class="fas fa-arrow-left"></i> Вернуться назад
        </a>
    </div>

    <div class="suggestions">
        <div class="suggestions-title">
            <i class="fas fa-lightbulb"></i> Возможно, вам будет интересно:
        </div>
        <div class="suggestions-links">
            <a href="/category/notebooks" class="suggestion-link">Ноутбуки</a>
            <a href="/category/smartphones" class="suggestion-link">Смартфоны</a>
            <a href="/category/tv" class="suggestion-link">Телевизоры</a>
            <a href="/category/audio" class="suggestion-link">Аудиотехника</a>
            <a href="/category/gaming" class="suggestion-link">Игры</a>
            <a href="/category/accessories" class="suggestion-link">Аксессуары</a>
        </div>
    </div>
</div>

<script>
    function addBackgroundElements() {
        if (!document.querySelector('.bg-blur-circle')) {
            const circles = [
                {className: 'bg-circle-1', size: 600, top: -200, left: -200},
                {className: 'bg-circle-2', size: 550, bottom: -150, right: -150},
                {className: 'bg-circle-3', size: 450, top: '60%', left: '10%'},
                {className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%'}
            ];
            circles.forEach(circle => {
                const div = document.createElement('div');
                div.className = `bg-blur-circle ${circle.className}`;
                if (circle.size) div.style.width = `${circle.size}px`;
                if (circle.size) div.style.height = `${circle.size}px`;
                if (circle.top) div.style.top = circle.top;
                if (circle.left) div.style.left = circle.left;
                if (circle.bottom) div.style.bottom = circle.bottom;
                if (circle.right) div.style.right = circle.right;
                document.body.appendChild(div);
            });
        }
        if (!document.querySelector('.soft-glow')) {
            const glow = document.createElement('div');
            glow.className = 'soft-glow';
            document.body.appendChild(glow);
        }
        if (!document.querySelector('.stars')) {
            const stars = document.createElement('div');
            stars.className = 'stars';
            stars.id = 'stars';
            document.body.appendChild(stars);
        }
    }

    function createStars() {
        const container = document.getElementById('stars');
        if (!container) return;
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            const rand = Math.random();
            star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        addBackgroundElements();
        createStars();
    });
</script>
</body>
</html>
