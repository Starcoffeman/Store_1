<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8" />
        <title>Вход | ТехноШок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        /* Переопределение цвета ссылок */
        .register-link, .forgot-link {
            color: var(--off-white) !important;
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .register-link:hover, .forgot-link:hover {
            color: var(--neon-green) !important;
            background: rgba(111, 240, 165, 0.1);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(111, 240, 165, 0.2);
            font-size: 13px;
        }

        .forgot-link:hover {
            background: none;
            transform: translateY(-2px);
        }

        /* Дополнительно - для всех ссылок на странице логина */
        .login-container a:not(.btn):not(.admin-button) {
            color: var(--off-white);
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .login-container a:not(.btn):not(.admin-button):hover {
            color: var(--neon-green);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }


        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
            #0f1f1f 0%,
            #1a2a2a 30%,
            #0f2a2a 60%,
            #1a2a2a 100%);
            z-index: -2;
        }

        .bg-blur-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .bg-circle-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.25), transparent);
            animation: floatSoft1 22s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 550px;
            height: 550px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.2), transparent);
            animation: floatSoft2 25s ease-in-out infinite;
        }

        .bg-circle-3 {
            width: 450px;
            height: 450px;
            top: 60%;
            left: 10%;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.15), transparent);
            animation: floatSoft3 28s ease-in-out infinite;
        }

        .bg-circle-4 {
            width: 500px;
            height: 500px;
            bottom: 20%;
            right: 20%;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.18), transparent);
            animation: floatSoft4 24s ease-in-out infinite reverse;
        }

        @keyframes floatSoft1 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -40px) scale(1.08);
            }
            66% {
                transform: translate(-30px, 30px) scale(0.95);
            }
        }

        @keyframes floatSoft2 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-35px, -30px) scale(1.05);
            }
            66% {
                transform: translate(25px, 35px) scale(0.98);
            }
        }

        @keyframes floatSoft3 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(45px, 25px) scale(1.1);
            }
            66% {
                transform: translate(-25px, -35px) scale(0.92);
            }
        }

        @keyframes floatSoft4 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-40px, 35px) scale(1.03);
            }
            66% {
                transform: translate(30px, -25px) scale(0.97);
            }
        }

        .soft-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.2) 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(111, 240, 165, 0.4);
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star-medium {
            width: 3px;
            height: 3px;
            background: rgba(111, 240, 165, 0.5);
            animation-duration: 4s;
        }

        .star-large {
            width: 4px;
            height: 4px;
            background: rgba(111, 240, 165, 0.6);
            animation-duration: 5s;
        }

        @keyframes starTwinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.3);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(111, 240, 165, 0);
            }
        }

        .login-container {
            max-width: 480px;
            margin: 20px auto;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
            border-radius: 18px;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .store-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        .store-icon i {
            font-size: 32px;
            color: var(--night-dark);
        }

        .admin-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(111, 240, 165, 0.1);
            border: 1px solid var(--neon-green);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--neon-green);
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .admin-button:hover {
            background: var(--neon-green);
            color: var(--night-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-header h2 {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
            margin: 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .remember-me label {
            margin: 0;
            font-size: 14px;
            cursor: pointer;
        }

        .success-message {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            padding: 10px 12px;
            border-radius: 10px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(111, 240, 165, 0.2);
            font-size: 13px;
        }

        .register-link {
            padding: 10px 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all var(--transition-fast);
        }

        .register-link:hover {
            background: rgba(111, 240, 165, 0.1);
            transform: translateX(3px);
        }

        .form-footer {
            display: flex;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .login-container {
                margin: 15px;
                padding: 30px 25px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .form-footer {
                flex-direction: column;
            }

            .btn-success {
                width: 100%;
            }

            .register-link {
                width: 100%;
                text-align: center;
            }

            .admin-button {
                position: relative;
                top: 0;
                right: 0;
                width: 100%;
                margin-bottom: 20px;
                justify-content: center;
                display: flex;
                align-items: center;
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
<div class="bg-blur-circle bg-circle-1"></div>
<div class="bg-blur-circle bg-circle-2"></div>
<div class="bg-blur-circle bg-circle-3"></div>
<div class="bg-blur-circle bg-circle-4"></div>
<div class="stars" id="stars"></div>
<div class="soft-glow"></div>

<div class="login-container glass-card">
    <button class="admin-button" onclick="window.location.href='/admin'">
        <i class="fas fa-user-shield"></i> Админ-панель
    </button>

    <div class="login-header">
        <div class="store-icon">
            <i class="fas fa-laptop-code"></i>
        </div>
        <h1>ТехноШок</h1>
        <h2>Добро пожаловать! Войдите в свой аккаунт</h2>
    </div>

    <form th:action="@{/login}" method="post" th:object="${loginForm}" id="loginForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="username">
                <i class="fas fa-user"></i> Логин или Email
            </label>
            <div class="input-wrapper">
                <i class="fas fa-envelope input-icon"></i>
                <input type="text"
                       class="form-control input-with-icon"
                       id="username"
                       th:field="*{username}"
                       placeholder="Введите ваш логин или email"
                       required />
            </div>
        </div>

        <!-- Поле Пароль -->
        <div class="form-group">
            <label for="password">
                <i class="fas fa-lock"></i> Пароль
            </label>
            <div class="input-wrapper">
                <i class="fas fa-key input-icon"></i>
                <input type="password"
                       class="form-control input-with-icon"
                       id="password"
                       th:field="*{password}"
                       placeholder="Введите пароль"
                       required/>
                <button type="button"
                        class="toggle-password"
                        onclick="togglePassword()">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="remember-me" />
            <label for="rememberMe">Запомнить меня</label>
        </div>

        <div th:if="${param.error}" class="text-danger" style="margin: 15px 0;">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Неверные данные авторизации. Пожалуйста, проверьте логин и пароль.</span>
        </div>

        <div th:if="${param.logout}" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span>Вы успешно вышли из системы.</span>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
            <a href="/register" class="register-link">
                <i class="fas fa-user-plus"></i> Создать аккаунт
            </a>
        </div>

        <a href="/forgot-password" class="forgot-link">
            <i class="fas fa-question-circle"></i> Забыли пароль?
        </a>
    </form>
</div>

<script>
    function createStars() {
        const container = document.getElementById('stars');
        const starCount = 120;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            const size = Math.random();
            if (size < 0.6) {
                star.className = 'star';
            } else if (size < 0.9) {
                star.className = 'star star-medium';
            } else {
                star.className = 'star star-large';
            }
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = 2 + Math.random() * 4 + 's';
            container.appendChild(star);
        }
    }

    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.querySelector('.toggle-password i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        createStars();

        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        usernameInput?.addEventListener('input', function() {
            this.style.borderColor = '';
            const errorDiv = document.querySelector('.text-danger');
            if (errorDiv && errorDiv.innerHTML.includes('заполните')) {
                errorDiv.remove();
            }
        });

        passwordInput?.addEventListener('input', function() {
            this.style.borderColor = '';
            const errorDiv = document.querySelector('.text-danger');
            if (errorDiv && errorDiv.innerHTML.includes('заполните')) {
                errorDiv.remove();
            }
        });

        form?.addEventListener('submit', function(e) {
            const username = usernameInput?.value.trim();
            const password = passwordInput?.value.trim();

            if (!username || !password) {
                e.preventDefault();
                showError('Пожалуйста, заполните все поля');
                return false;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
            submitBtn.disabled = true;

            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 3000);

            return true;
        });
    });

    function showError(message) {
        const existingError = document.querySelector('.text-danger:not([th\\:if])');
        if (existingError) existingError.remove();

        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-danger';
        errorDiv.style.cssText = 'background: rgba(255, 107, 107, 0.1); padding: 12px; border-radius: 10px; margin: 15px 0;';
        errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span>${message}</span>`;

        const form = document.getElementById('loginForm');
        const rememberDiv = document.querySelector('.remember-me');
        form.insertBefore(errorDiv, rememberDiv);

        const username = document.getElementById('username');
        const password = document.getElementById('password');
        if (!username.value.trim()) username.style.borderColor = 'var(--danger)';
        if (!password.value.trim()) password.style.borderColor = 'var(--danger)';

        setTimeout(() => {
            errorDiv.style.opacity = '0';
            setTimeout(() => errorDiv.remove(), 300);
        }, 3000);
    }

    const rememberCheckbox = document.getElementById('rememberMe');
    const usernameField = document.getElementById('username');

    if (rememberCheckbox && localStorage.getItem('rememberMe') === 'true') {
        rememberCheckbox.checked = true;
        const savedUsername = localStorage.getItem('savedUsername');
        if (savedUsername && usernameField) {
            usernameField.value = savedUsername;
        }
    }

    rememberCheckbox?.addEventListener('change', function() {
        if (this.checked && usernameField.value) {
            localStorage.setItem('rememberMe', 'true');
            localStorage.setItem('savedUsername', usernameField.value);
        } else {
            localStorage.removeItem('rememberMe');
            localStorage.removeItem('savedUsername');
        }
    });

    document.getElementById('username')?.focus();
</script>
</body>
</html>
