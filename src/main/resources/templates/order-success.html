<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Заказ оформлен | ТехноШок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <style>
        .success-wrapper {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            padding: 40px;
            background: rgba(37, 39, 43, 0.9);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
        }
        .success-icon {
            font-size: 5rem;
            color: var(--neon-green);
            margin-bottom: 20px;
        }
        .order-number {
            font-size: 1.5rem;
            color: var(--neon-green);
            margin: 20px 0;
        }
        .btn-continue {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: all var(--transition-fast);
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
            color: var(--night-dark);
        }
    </style>
</head>
<body>
<div class="success-wrapper">
    <div class="success-icon">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1>Заказ успешно оформлен!</h1>
    <p>Номер вашего заказа:</p>
    <div class="order-number" th:text="'#' + ${orderId}">#12345</div>
    <p>Статус заказа:
        <strong>
            <span th:if="${status == 'PENDING'}">Ожидает обработки</span>
            <span th:if="${status == 'pending'}">Ожидает обработки</span>
            <span th:if="${status == 'CONFIRMED'}">Подтверждён</span>
            <span th:if="${status == 'confirmed'}">Подтверждён</span>
            <span th:if="${status == 'PROCESSING'}">В обработке</span>
            <span th:if="${status == 'processing'}">В обработке</span>
            <span th:if="${status == 'SHIPPED'}">Отправлен</span>
            <span th:if="${status == 'shipped'}">Отправлен</span>
            <span th:if="${status == 'DELIVERED'}">Доставлен</span>
            <span th:if="${status == 'delivered'}">Доставлен</span>
            <span th:if="${status == 'COMPLETED'}">Завершён</span>
            <span th:if="${status == 'completed'}">Завершён</span>
            <span th:if="${status == 'CANCELLED'}">Отменён</span>
            <span th:if="${status == 'cancelled'}">Отменён</span>
        </strong>
    </p>
    <p>Подтверждение отправлено на вашу электронную почту.</p>
    <a href="/" class="btn-continue">
        <i class="fas fa-home"></i> На главную
    </a>
</div>
</body>
</html>
