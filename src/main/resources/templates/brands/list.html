<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Бренды | TechStore</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<style>
		body {
			background: var(--night-dark);
			min-height: 100vh;
			padding: 20px;
		}
		.brands-container {
			max-width: 1000px;
			margin: 0 auto;
			background: rgba(37, 39, 43, 0.85);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			border: 1px solid rgba(111, 240, 165, 0.2);
			padding: 30px;
			animation: fadeInUp 0.6s ease-out;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 25px;
			flex-wrap: wrap;
			gap: 15px;
		}
		.header h1 {
			font-size: 1.8rem;
			margin: 0;
			background: linear-gradient(135deg, var(--white), var(--neon-green));
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
		}
		.btn-add {
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			color: var(--night-dark);
			border: none;
			border-radius: 12px;
			padding: 10px 20px;
			font-weight: 600;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}
		.btn-add:hover {
			transform: translateY(-2px);
			box-shadow: var(--shadow-neon);
			color: var(--night-dark);
		}
		.btn-back {
			background: rgba(255, 255, 255, 0.1);
			color: var(--off-white);
			border: 1px solid rgba(111, 240, 165, 0.3);
			border-radius: 12px;
			padding: 10px 20px;
			font-weight: 600;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}
		.btn-back:hover {
			background: rgba(111, 240, 165, 0.1);
			color: var(--neon-green);
			transform: translateX(3px);
		}
		table {
			width: 100%;
			color: var(--off-white);
			border-collapse: collapse;
		}
		th, td {
			padding: 12px;
			text-align: left;
			border-bottom: 1px solid rgba(111, 240, 165, 0.1);
		}
		th {
			color: var(--neon-green);
			background: rgba(0, 0, 0, 0.3);
		}
		tr:hover {
			background: rgba(111, 240, 165, 0.05);
		}
		.btn-edit, .btn-delete {
			padding: 6px 12px;
			border-radius: 8px;
			font-size: 0.85rem;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 5px;
			margin: 0 5px;
			transition: all 0.3s ease;
		}
		.btn-edit {
			background: rgba(111, 240, 165, 0.1);
			border: 1px solid var(--neon-green);
			color: var(--neon-green);
		}
		.btn-edit:hover {
			background: var(--neon-green);
			color: var(--night-dark);
			transform: translateY(-2px);
		}
		.btn-delete {
			background: rgba(255, 107, 107, 0.1);
			border: 1px solid var(--danger);
			color: var(--danger);
		}
		.btn-delete:hover {
			background: var(--danger);
			color: white;
			transform: translateY(-2px);
		}
		.empty-state {
			text-align: center;
			padding: 60px 20px;
			color: var(--off-white);
		}
		.empty-state i {
			font-size: 4rem;
			color: var(--neon-green);
			opacity: 0.5;
			margin-bottom: 15px;
		}
		@media (max-width: 768px) {
			.brands-container { padding: 20px; }
			.header { flex-direction: column; align-items: flex-start; }
			th, td { padding: 8px; font-size: 0.85rem; }
		}
	</style>
</head>
<body>
<div class="brands-container">
	<div class="header">
		<h1><i class="fas fa-trademark"></i> Бренды</h1>
		<div style="display: flex; gap: 10px;">
			<a href="/brands/add" class="btn-add"><i class="fas fa-plus"></i> Добавить бренд</a>
			<a href="/admin" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</a>
		</div>
	</div>

	<!-- Проверка на null и пустоту -->
	<div th:if="${brands != null and !brands.isEmpty()}">
		<div class="table-responsive">
			<table>
				<thead>
				<tr>
					<th>ID</th>
					<th>Название бренда</th>
					<th style="width: 200px;">Действия</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="brand : ${brands}">
					<!-- Используем brand.id и brand.name с проверкой -->
					<td th:text="${brand.id != null ? brand.id : '-'}">1</td>
					<td th:text="${brand.name != null ? brand.name : '-'}">Brand Name</td>
					<td>
						<a th:href="@{'/brands/edit/' + ${brand.id}}" class="btn-edit" th:if="${brand.id != null}">
							<i class="fas fa-edit"></i> Редактировать
						</a>
						<a th:href="@{'/brands/delete/' + ${brand.id}}"
						   class="btn-delete"
						   th:if="${brand.id != null}"
						   onclick="return confirm('Вы уверены, что хотите удалить бренд?')">
							<i class="fas fa-trash-alt"></i> Удалить
						</a>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</div>

	<div th:if="${brands == null or brands.isEmpty()}" class="empty-state">
		<i class="fas fa-trademark"></i>
		<h3>Нет брендов</h3>
		<p>Нажмите "Добавить бренд", чтобы создать первый бренд</p>
		<a href="/brands/add" class="btn-add mt-3" style="display: inline-flex; margin-top: 15px;">
			<i class="fas fa-plus"></i> Добавить бренд
		</a>
	</div>
</div>

<script>
	function addBackgroundElements() {
		if (!document.querySelector('.bg-blur-circle')) {
			const circles = [
				{ className: 'bg-circle-1', size: 600, top: -200, left: -200 },
				{ className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
				{ className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
				{ className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
			];
			circles.forEach(circle => {
				const div = document.createElement('div');
				div.className = `bg-blur-circle ${circle.className}`;
				if (circle.size) div.style.width = `${circle.size}px`;
				if (circle.size) div.style.height = `${circle.size}px`;
				if (circle.top) div.style.top = circle.top;
				if (circle.left) div.style.left = circle.left;
				if (circle.bottom) div.style.bottom = circle.bottom;
				if (circle.right) div.style.right = circle.right;
				document.body.appendChild(div);
			});
		}
		if (!document.querySelector('.soft-glow')) {
			const glow = document.createElement('div');
			glow.className = 'soft-glow';
			document.body.appendChild(glow);
		}
		if (!document.querySelector('.stars')) {
			const stars = document.createElement('div');
			stars.className = 'stars';
			stars.id = 'stars';
			document.body.appendChild(stars);
		}
	}

	function createStars() {
		const container = document.getElementById('stars');
		if (!container) return;
		for (let i = 0; i < 80; i++) {
			const star = document.createElement('div');
			const rand = Math.random();
			star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
			star.style.left = Math.random() * 100 + '%';
			star.style.top = Math.random() * 100 + '%';
			star.style.animationDelay = Math.random() * 5 + 's';
			container.appendChild(star);
		}
	}

	document.addEventListener('DOMContentLoaded', function() {
		addBackgroundElements();
		createStars();
	});
</script>
</body>
</html>
