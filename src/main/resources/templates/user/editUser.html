<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .form-container {
            max-width: 550px;
            width: 90%;
            margin: 20px auto;
            padding: 35px;
            background: rgba(37, 39, 43, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(111, 240, 165, 0); }
        }

        .form-icon i {
            font-size: 32px;
            color: var(--night-dark);
        }

        .form-header h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-header p {
            font-size: 0.85rem;
            color: var(--off-white);
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-weight: 500;
            color: var(--off-white);
            margin-bottom: 6px;
            display: block;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-size: 14px;
            z-index: 2;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 10px 40px 10px 40px;
            background: rgba(37, 39, 43, 0.9);
            border: 2px solid rgba(111, 240, 165, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-size: 14px;
            transition: all var(--transition-normal);
        }

        .form-control:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(111, 240, 165, 0.2);
        }

        .form-control::placeholder {
            color: rgba(239, 239, 239, 0.5);
        }

        .text-danger {
            color: #ff6b6b !important;
            font-size: 11px;
            margin-top: 4px;
        }

        .form-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            transition: all var(--transition-normal);
            cursor: pointer;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-neon);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(111, 240, 165, 0.3);
            color: var(--off-white);
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all var(--transition-normal);
            text-decoration: none;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            transform: translateX(3px);
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 25px;
                margin: 15px;
            }

            .form-buttons {
                flex-direction: column;
            }

            .form-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <div class="form-icon">
            <i class="fas fa-user-edit"></i>
        </div>
        <h1>Редактирование пользователя</h1>
        <p>Измените информацию о пользователе</p>
    </div>

    <form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="form-group">
            <label for="username">Логин *</label>
            <div class="input-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Введите логин" required>
            </div>
            <div th:if="${#fields.hasErrors('username')}" class="text-danger">
                <span th:errors="*{username}"></span>
