<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>403 - Доступ запрещён | ТехноШок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <style>
        body {
            background: var(--night-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 50px 30px;
            background: rgba(37, 39, 43, 0.9);
            border-radius: 30px;
            border: 1px solid rgba(111, 240, 165, 0.2);
        }
        .error-code { font-size: 6rem; font-weight: 800; color: var(--neon-green); margin-bottom: 20px; }
        .error-icon { font-size: 4rem; color: var(--neon-green); margin-bottom: 20px; }
        .error-title { font-size: 1.5rem; color: var(--white); margin-bottom: 15px; }
        .error-message { color: var(--off-white); margin-bottom: 30px; }
        .btn-home { background: var(--neon-green); color: var(--night-dark); padding: 12px 30px; border-radius: 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: var(--shadow-neon); color: var(--night-dark); }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon"><i class="fas fa-lock"></i></div>
    <div class="error-code" th:text="${errorCode}">403</div>
    <h1 class="error-title" th:text="${errorTitle}">Доступ запрещён</h1>
    <p class="error-message" th:text="${errorMessage}">У вас нет прав для доступа к этой странице.</p>
    <a href="/" class="btn-home"><i class="fas fa-home"></i> На главную</a>
</div>
</body>
</html>
