<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Сброс пароля | ТехноШок</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
	<link rel="stylesheet" th:href="@{/css/main.css}"/>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<style>
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			background: linear-gradient(135deg, #0a0f0f 0%, #1a2a2a 100%);
			position: relative;
			overflow: hidden;
		}

		/* Фоновые анимации */
		.bg-animation {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: -1;
			overflow: hidden;
		}

		.bg-circle {
			position: absolute;
			border-radius: 50%;
			filter: blur(80px);
			animation: floatBubble 20s ease-in-out infinite;
		}

		.bg-circle-1 {
			width: 500px;
			height: 500px;
			top: -200px;
			left: -150px;
			background: radial-gradient(circle, rgba(111, 240, 165, 0.2), transparent);
			animation-delay: 0s;
		}

		.bg-circle-2 {
			width: 450px;
			height: 450px;
			bottom: -150px;
			right: -100px;
			background: radial-gradient(circle, rgba(111, 240, 165, 0.15), transparent);
			animation-delay: 5s;
		}

		.bg-circle-3 {
			width: 350px;
			height: 350px;
			top: 50%;
			left: 20%;
			background: radial-gradient(circle, rgba(111, 240, 165, 0.1), transparent);
			animation-delay: 10s;
		}

		@keyframes floatBubble {
			0%, 100% {
				transform: translate(0, 0) scale(1);
			}
			33% {
				transform: translate(40px, -30px) scale(1.1);
			}
			66% {
				transform: translate(-30px, 40px) scale(0.9);
			}
		}

		/* Падающие звёзды */
		.shooting-star {
			position: absolute;
			width: 2px;
			height: 2px;
			background: linear-gradient(135deg, var(--neon-green), transparent);
			border-radius: 50%;
			animation: shoot 3s linear infinite;
			opacity: 0;
		}

		@keyframes shoot {
			0% {
				transform: translateX(0) translateY(0) rotate(45deg);
				opacity: 0;
			}
			10% {
				opacity: 1;
			}
			80% {
				opacity: 1;
			}
			100% {
				transform: translateX(-200px) translateY(200px) rotate(45deg);
				opacity: 0;
			}
		}

		.reset-container {
			max-width: 450px;
			width: 100%;
			margin: 20px;
			animation: slideInUp 0.6s ease-out;
		}

		@keyframes slideInUp {
			from {
				opacity: 0;
				transform: translateY(50px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.reset-card {
			background: rgba(37, 39, 43, 0.95);
			backdrop-filter: blur(10px);
			border-radius: 24px;
			padding: 35px;
			border: 1px solid rgba(111, 240, 165, 0.2);
			transition: all 0.3s ease;
			animation: glowBorder 3s ease-in-out infinite;
		}

		@keyframes glowBorder {
			0%, 100% {
				border-color: rgba(111, 240, 165, 0.2);
				box-shadow: 0 0 20px rgba(111, 240, 165, 0);
			}
			50% {
				border-color: rgba(111, 240, 165, 0.5);
				box-shadow: 0 0 30px rgba(111, 240, 165, 0.1);
			}
		}

		.reset-card:hover {
			transform: translateY(-5px);
			border-color: rgba(111, 240, 165, 0.4);
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
		}

		.reset-icon {
			width: 70px;
			height: 70px;
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0 auto 20px;
			animation: pulse 2s ease-in-out infinite, rotateIcon 10s linear infinite;
		}

		@keyframes pulse {
			0%, 100% {
				transform: scale(1);
				box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4);
			}
			50% {
				transform: scale(1.05);
				box-shadow: 0 0 0 15px rgba(111, 240, 165, 0);
			}
		}

		@keyframes rotateIcon {
			from {
				transform: rotate(0deg);
			}
			to {
				transform: rotate(360deg);
			}
		}

		.reset-icon i {
			font-size: 32px;
			color: var(--night-dark);
			animation: counterRotate 10s linear infinite;
		}

		@keyframes counterRotate {
			from {
				transform: rotate(0deg);
			}
			to {
				transform: rotate(-360deg);
			}
		}

		h2 {
			text-align: center;
			color: var(--white);
			margin-bottom: 10px;
			animation: fadeIn 0.8s ease-out;
		}

		.description {
			text-align: center;
			color: var(--off-white);
			opacity: 0.8;
			margin-bottom: 25px;
			font-size: 14px;
			animation: fadeIn 0.8s ease-out 0.1s backwards;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(-10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.form-group {
			margin-bottom: 20px;
			animation: slideInLeft 0.5s ease-out backwards;
		}

		.form-group:nth-child(1) { animation-delay: 0.1s; }
		.form-group:nth-child(2) { animation-delay: 0.2s; }
		.form-group:nth-child(4) { animation-delay: 0.3s; }
		.form-group:nth-child(5) { animation-delay: 0.4s; }

		@keyframes slideInLeft {
			from {
				opacity: 0;
				transform: translateX(-20px);
			}
			to {
				opacity: 1;
				transform: translateX(0);
			}
		}

		label {
			color: var(--off-white);
			margin-bottom: 8px;
			display: block;
			transition: all 0.3s ease;
		}

		.input-wrapper {
			position: relative;
		}

		.input-icon {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--neon-green);
			transition: all 0.3s ease;
			z-index: 1;
		}

		.toggle-password {
			position: absolute;
			right: 12px;
			top: 50%;
			transform: translateY(-50%);
			background: none;
			border: none;
			color: var(--off-white);
			cursor: pointer;
			transition: all 0.3s ease;
			z-index: 1;
		}

		.toggle-password:hover {
			color: var(--neon-green);
			transform: translateY(-50%) scale(1.1);
		}

		input {
			width: 100%;
			padding: 12px 12px 12px 40px;
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(111, 240, 165, 0.3);
			border-radius: 12px;
			color: var(--white);
			font-size: 14px;
			transition: all 0.3s ease;
		}

		input:focus {
			outline: none;
			border-color: var(--neon-green);
			box-shadow: 0 0 0 3px rgba(111, 240, 165, 0.2);
			transform: translateX(5px);
			background: rgba(255, 255, 255, 0.12);
		}

		input:hover {
			border-color: rgba(111, 240, 165, 0.5);
			background: rgba(255, 255, 255, 0.1);
		}

		.btn-reset {
			width: 100%;
			background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
			color: var(--night-dark);
			border: none;
			padding: 12px;
			border-radius: 12px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.3s ease;
			margin-top: 10px;
			position: relative;
			overflow: hidden;
			animation: slideInLeft 0.5s ease-out 0.5s backwards;
		}

		.btn-reset::before {
			content: '';
			position: absolute;
			top: 0;
			left: -100%;
			width: 100%;
			height: 100%;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
			transition: left 0.5s ease;
		}

		.btn-reset:hover::before {
			left: 100%;
		}

		.btn-reset:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 25px rgba(111, 240, 165, 0.4);
		}

		.btn-reset:active {
			transform: translateY(0);
		}

		.back-link {
			display: block;
			text-align: center;
			margin-top: 20px;
			color: var(--off-white);
			text-decoration: none;
			transition: all 0.3s ease;
			animation: fadeIn 0.5s ease-out 0.6s backwards;
		}

		.back-link:hover {
			color: var(--neon-green);
			transform: translateX(-5px);
		}

		.alert {
			padding: 12px;
			border-radius: 10px;
			margin-bottom: 20px;
			text-align: center;
			animation: shake 0.5s ease-out;
		}

		@keyframes shake {
			0%, 100% { transform: translateX(0); }
			10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
			20%, 40%, 60%, 80% { transform: translateX(5px); }
		}

		.alert-danger {
			background: rgba(231, 76, 60, 0.2);
			border: 1px solid #e74c3c;
			color: #e74c3c;
		}

		.alert-success {
			background: rgba(46, 204, 113, 0.2);
			border: 1px solid #2ecc71;
			color: #2ecc71;
		}

		.password-requirements {
			font-size: 12px;
			color: var(--off-white);
			opacity: 0.7;
			margin-top: 5px;
			transition: all 0.3s ease;
		}

		.password-requirements i {
			transition: all 0.3s ease;
		}

		.password-requirements:hover {
			opacity: 1;
		}

		.password-requirements:hover i {
			color: var(--neon-green);
			transform: scale(1.1);
			display: inline-block;
		}

		.separator {
			text-align: center;
			color: var(--off-white);
			opacity: 0.5;
			margin: 15px 0;
			font-size: 12px;
			position: relative;
			animation: fadeIn 0.5s ease-out 0.15s backwards;
		}

		.separator::before,
		.separator::after {
			content: '';
			position: absolute;
			top: 50%;
			width: 30%;
			height: 1px;
			background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
		}

		.separator::before {
			left: 0;
		}

		.separator::after {
			right: 0;
		}

		/* Анимация загрузки для кнопки */
		.btn-reset.loading {
			pointer-events: none;
			opacity: 0.7;
		}

		.btn-reset.loading i {
			animation: spin 1s linear infinite;
		}

		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}
	</style>
</head>
<body>
<div class="bg-animation">
	<div class="bg-circle bg-circle-1"></div>
	<div class="bg-circle bg-circle-2"></div>
	<div class="bg-circle bg-circle-3"></div>
</div>

<div class="reset-container">
	<div class="reset-card">
		<div class="reset-icon">
			<i class="fas fa-key"></i>
		</div>
		<h2>Сброс пароля</h2>
		<p class="description">Введите логин и email для подтверждения</p>

		<div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
		<div th:if="${param.message}" class="alert alert-success" th:text="${param.message}"></div>

		<form th:action="@{/users/reset-password}" method="post" th:object="${resetRequest}" id="resetForm">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

			<div class="form-group">
				<label>Логин</label>
				<div class="input-wrapper">
					<i class="fas fa-user input-icon"></i>
					<input type="text" th:field="*{username}" placeholder="Введите ваш логин" required>
				</div>
			</div>

			<div class="form-group">
				<label>Email</label>
				<div class="input-wrapper">
					<i class="fas fa-envelope input-icon"></i>
					<input type="email" th:field="*{email}" placeholder="example@mail.com" required>
				</div>
			</div>

			<div class="separator">━━━━━━━━━━━━━━━━━━━━</div>

			<div class="form-group">
				<label>Новый пароль</label>
				<div class="input-wrapper">
					<i class="fas fa-lock input-icon"></i>
					<input type="password" th:field="*{newPassword}" id="newPassword" required>
					<button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
						<i class="fas fa-eye"></i>
					</button>
				</div>
				<div class="password-requirements">
					<i class="fas fa-info-circle"></i> Минимум 4 символа
				</div>
			</div>

			<div class="form-group">
				<label>Подтверждение пароля</label>
				<div class="input-wrapper">
					<i class="fas fa-check input-icon"></i>
					<input type="password" th:field="*{confirmPassword}" id="confirmPassword" required>
					<button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
						<i class="fas fa-eye"></i>
					</button>
				</div>
			</div>

			<button type="submit" class="btn-reset" id="submitBtn">
				<i class="fas fa-save"></i> Сбросить пароль
			</button>
		</form>

		<a href="/login" class="back-link">
			<i class="fas fa-arrow-left"></i> Вернуться ко входу
		</a>
	</div>
</div>

<script>
	function togglePassword(fieldId) {
		const input = document.getElementById(fieldId);
		const icon = input.parentElement.querySelector('.toggle-password i');

		if (input.type === 'password') {
			input.type = 'text';
			icon.classList.remove('fa-eye');
			icon.classList.add('fa-eye-slash');
		} else {
			input.type = 'password';
			icon.classList.remove('fa-eye-slash');
			icon.classList.add('fa-eye');
		}
	}

	// Добавляем эффект загрузки при отправке формы
	document.getElementById('resetForm')?.addEventListener('submit', function(e) {
		const submitBtn = document.getElementById('submitBtn');
		const originalText = submitBtn.innerHTML;
		submitBtn.innerHTML = '<i class="fas fa-spinner"></i> Сброс...';
		submitBtn.classList.add('loading');

		setTimeout(() => {
			submitBtn.innerHTML = originalText;
			submitBtn.classList.remove('loading');
		}, 3000);
	});

	// Добавляем звёзды
	function createShootingStars() {
		const body = document.body;
		for (let i = 0; i < 5; i++) {
			const star = document.createElement('div');
			star.className = 'shooting-star';
			star.style.top = Math.random() * 100 + '%';
			star.style.left = Math.random() * 100 + '%';
			star.style.animationDelay = Math.random() * 10 + 's';
			star.style.animationDuration = 2 + Math.random() * 2 + 's';
			body.appendChild(star);
		}
	}

	createShootingStars();
</script>
</body>
</html>
