<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Регистрация | ТехноШок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background: var(--night-dark);
        }

        /* Основной градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f1f1f 0%, #1a2a2a 30%, #0f2a2a 60%, #1a2a2a 100%);
            z-index: -2;
        }

        .bg-blur-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .bg-circle-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.25), transparent);
            animation: floatSoft1 22s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 550px;
            height: 550px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.2), transparent);
            animation: floatSoft2 25s ease-in-out infinite;
        }

        .bg-circle-3 {
            width: 450px;
            height: 450px;
            top: 60%;
            left: 10%;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.15), transparent);
            animation: floatSoft3 28s ease-in-out infinite;
        }

        .bg-circle-4 {
            width: 500px;
            height: 500px;
            bottom: 20%;
            right: 20%;
            background: radial-gradient(circle, rgba(111, 240, 165, 0.18), transparent);
            animation: floatSoft4 24s ease-in-out infinite reverse;
        }

        @keyframes floatSoft1 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -40px) scale(1.08);
            }
            66% {
                transform: translate(-30px, 30px) scale(0.95);
            }
        }

        @keyframes floatSoft2 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-35px, -30px) scale(1.05);
            }
            66% {
                transform: translate(25px, 35px) scale(0.98);
            }
        }

        @keyframes floatSoft3 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(45px, 25px) scale(1.1);
            }
            66% {
                transform: translate(-25px, -35px) scale(0.92);
            }
        }

        @keyframes floatSoft4 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-40px, 35px) scale(1.03);
            }
            66% {
                transform: translate(30px, -25px) scale(0.97);
            }
        }

        .soft-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.2) 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(111, 240, 165, 0.4);
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }

        .star-medium {
            width: 3px;
            height: 3px;
            background: rgba(111, 240, 165, 0.5);
            animation-duration: 4s;
        }

        .star-large {
            width: 4px;
            height: 4px;
            background: rgba(111, 240, 165, 0.6);
            animation-duration: 5s;
        }

        @keyframes starTwinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.3);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(111, 240, 165, 0);
            }
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-container {
            max-width: 900px;
            width: 90%;
            margin: 20px auto;
            padding: 40px;
            background: rgba(37, 39, 43, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            position: relative;
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 3s ease-in-out infinite;
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .store-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        .store-icon i {
            font-size: 36px;
            color: var(--night-dark);
        }

        .register-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .register-header p {
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0.8;
            margin: 0;
        }

        .all {
            display: flex;
            gap: 30px;
        }

        .group1, .group2 {
            flex: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 500;
            color: var(--off-white);
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-size: 16px;
            z-index: 2;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 12px 45px 12px 45px;
            background: rgba(37, 39, 43, 0.9);
            border: 2px solid rgba(111, 240, 165, 0.2);
            border-radius: 12px;
            color: var(--white);
            font-size: 15px;
            transition: all var(--transition-normal);
        }

        .form-control:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(111, 240, 165, 0.2);
        }

        .form-control::placeholder {
            color: rgba(239, 239, 239, 0.5);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--neon-green);
            cursor: pointer;
            font-size: 16px;
            z-index: 2;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .password-strength-text {
            font-size: 12px;
            margin-top: 5px;
        }

        .password-strength-text.weak {
            color: #ff6b6b;
        }

        .password-strength-text.medium {
            color: #ffa502;
        }

        .password-strength-text.strong {
            color: #2ecc71;
        }

        .text-muted {
            color: var(--neon-green) !important;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--neon-green);
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
            color: var(--off-white);
        }

        .checkbox-group a {
            color: var(--neon-green);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            color: var(--night-dark);
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(111, 240, 165, 0.4);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .login-link {
            padding: 10px 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all var(--transition-fast);
            text-decoration: none;
            color: var(--off-white);
            text-align: center;
        }

        .login-link:hover {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            transform: translateX(3px);
        }

        .text-danger {
            color: #ff6b6b !important;
            font-size: 12px;
            margin-top: 5px;
        }

        .success-message {
            background: rgba(111, 240, 165, 0.1);
            color: var(--neon-green);
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            animation: fadeInUp 0.5s ease-out;
            animation-fill-mode: both;
        }

        .group1 .form-group:nth-child(1) {
            animation-delay: 0.05s;
        }

        .group1 .form-group:nth-child(2) {
            animation-delay: 0.1s;
        }

        .group1 .form-group:nth-child(3) {
            animation-delay: 0.15s;
        }

        .group1 .form-group:nth-child(4) {
            animation-delay: 0.2s;
        }

        .group2 .form-group:nth-child(1) {
            animation-delay: 0.25s;
        }

        .group2 .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }

        .group2 .form-group:nth-child(3) {
            animation-delay: 0.35s;
        }

        .group2 .form-group:nth-child(4) {
            animation-delay: 0.4s;
        }

        @media (max-width: 768px) {
            .all {
                flex-direction: column;
                gap: 0;
            }

            .register-container {
                padding: 30px 25px;
                margin: 15px;
            }

            .form-footer {
                flex-direction: column;
            }

            .btn-success {
                width: 100%;
            }

            .login-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="bg-blur-circle bg-circle-1"></div>
<div class="bg-blur-circle bg-circle-2"></div>
<div class="bg-blur-circle bg-circle-3"></div>
<div class="bg-blur-circle bg-circle-4"></div>
<div class="stars" id="stars"></div>
<div class="soft-glow"></div>

<div class="register-container">
    <div class="register-header">
        <div class="store-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1>Создание аккаунта</h1>
        <p>Присоединяйтесь к ТехноШок и начните покупать электронику</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${registerForm}">
        <!-- ВАЖНО: CSRF токен -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="all">
            <div class="group1">
                <div class="form-group">
                    <label for="username">Логин *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="username" name="username" th:field="*{username}"
                               placeholder="Введите логин" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger"><span
                            th:errors="*{username}"></span></div>
                    <span class="text-muted">Только латинские буквы и цифры</span>
                </div>

                <div class="form-group">
                    <label for="name">Имя *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle input-icon"></i>
                        <input type="text" class="form-control" id="name" name="name" th:field="*{name}"
                               placeholder="Введите имя" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('name')}" class="text-danger"><span th:errors="*{name}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="surname">Фамилия *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle input-icon"></i>
                        <input type="text" class="form-control" id="surname" name="surname" th:field="*{surname}"
                               placeholder="Введите фамилию" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('surname')}" class="text-danger"><span
                            th:errors="*{surname}"></span></div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password" th:field="*{password}"
                               placeholder="Введите пароль" required/>
                        <button type="button" class="toggle-password" onclick="togglePassword()"><i
                                class="fas fa-eye"></i></button>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-strength-text" id="passwordStrengthText"></div>
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger"><span
                            th:errors="*{password}"></span></div>
                    <span class="text-muted">Минимум 6 символов</span>
                </div>
            </div>

            <div class="group2">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" name="email" th:field="*{email}"
                               placeholder="example@mail.com" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger"><span th:errors="*{email}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Адрес *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                        <input type="text" class="form-control" id="address" name="address" th:field="*{address}"
                               placeholder="Ваш адрес доставки" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('address')}" class="text-danger"><span
                            th:errors="*{address}"></span></div>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" class="form-control" id="phone" name="phone" th:field="*{phone}"
                               placeholder="+7 (XXX) XXX-XX-XX" required/>
                    </div>
                    <div th:if="${#fields.hasErrors('phone')}" class="text-danger"><span th:errors="*{phone}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Согласие</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="agreeTerms" required/>
                        <label for="agreeTerms">Я соглашаюсь с <a href="/terms" target="_blank">условиями
                            использования</a> и <a href="/privacy" target="_blank">политикой
                            конфиденциальности</a></label>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${param.error}" class="text-danger"
             style="background: rgba(255,107,107,0.1); padding: 12px; border-radius: 10px; margin: 20px 0;">
            <i class="fas fa-exclamation-triangle"></i> Ошибка при регистрации. Пожалуйста, проверьте введенные данные.
        </div>

        <div th:if="${param.success}" class="success-message">
            <i class="fas fa-check-circle"></i> Регистрация успешна! Теперь вы можете войти в систему.
        </div>

        <div class="form-footer">
            <button type="submit" class="btn btn-success" id="submitBtn"><i class="fas fa-user-plus"></i>
                Зарегистрироваться
            </button>
            <a href="/login" class="login-link"><i class="fas fa-sign-in-alt"></i> Уже есть аккаунт? Войти</a>
        </div>
    </form>
</div>

<script>
    function createStars() {
        const container = document.getElementById('stars');
        if (!container) return;
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            const rand = Math.random();
            star.className = rand < 0.6 ? 'star' : (rand < 0.9 ? 'star star-medium' : 'star star-large');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = 2 + Math.random() * 4 + 's';
            container.appendChild(star);
        }
    }

    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.querySelector('.toggle-password i');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('passwordStrengthBar');
    const strengthText = document.getElementById('passwordStrengthText');

    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        let width = 0, color = '', text = '';
        switch (strength) {
            case 0:
            case 1:
                width = 20;
                color = '#ff6b6b';
                text = 'Слабый пароль';
                break;
            case 2:
            case 3:
                width = 40;
                color = '#ffa502';
                text = 'Средний пароль';
                break;
            case 4:
                width = 80;
                color = '#2ecc71';
                text = 'Хороший пароль';
                break;
            case 5:
                width = 100;
                color = '#2ecc71';
                text = 'Отличный пароль!';
                break;
        }
        strengthBar.style.width = width + '%';
        strengthBar.style.backgroundColor = color;
        strengthText.textContent = text;
        strengthText.className = 'password-strength-text';
        if (strength <= 2) strengthText.classList.add('weak');
        else if (strength <= 3) strengthText.classList.add('medium');
        else strengthText.classList.add('strong');
    }

    if (passwordInput) {
        passwordInput.addEventListener('input', function () {
            checkPasswordStrength(this.value);
        });
    }

    const phoneInput = document.getElementById('phone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function (e) {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 0) {
                let formatted = '';
                if (value.length <= 1) formatted = '+' + value;
                else if (value.length <= 4) formatted = '+' + value.slice(0, 1) + ' (' + value.slice(1);
                else if (value.length <= 7) formatted = '+' + value.slice(0, 1) + ' (' + value.slice(1, 4) + ') ' + value.slice(4);
                else formatted = '+' + value.slice(0, 1) + ' (' + value.slice(1, 4) + ') ' + value.slice(4, 7) + '-' + value.slice(7, 9) + '-' + value.slice(9, 11);
                this.value = formatted;
            }
        });
    }

    document.getElementById('registerForm')?.addEventListener('submit', function (e) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const email = document.getElementById('email').value.trim();
        const agreeTerms = document.getElementById('agreeTerms').checked;

        if (!username) {
            e.preventDefault();
            alert('Введите логин');
            return false;
        }
        if (username.length < 3) {
            e.preventDefault();
            alert('Логин минимум 3 символа');
            return false;
        }
        if (!password) {
            e.preventDefault();
            alert('Введите пароль');
            return false;
        }
        if (password.length < 6) {
            e.preventDefault();
            alert('Пароль минимум 6 символов');
            return false;
        }
        if (!email) {
            e.preventDefault();
            alert('Введите email');
            return false;
        }
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailRegex.test(email)) {
            e.preventDefault();
            alert('Введите корректный email');
            return false;
        }
        if (!agreeTerms) {
            e.preventDefault();
            alert('Примите условия использования');
            return false;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
        btn.disabled = true;
        return true;
    });

    document.addEventListener('DOMContentLoaded', function () {
        createStars();
        document.getElementById('username')?.focus();
    });
</script>
</body>
</html>
