<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        /* Специфичные стили для страницы каталога */

        /* Центрирование и фон */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Кастомный контейнер - УМЕНЬШЕННЫЙ */
        .catalog-container {
            max-width: 700px;
            width: 90%;
            margin: 20px auto;
            padding: 30px 35px;
            background: rgba(37, 39, 43, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(111, 240, 165, 0.2);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Neon рамка */
        .catalog-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), transparent, var(--neon-green));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.3;
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Заголовок - УМЕНЬШЕННЫЙ */
        .catalog-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .admin-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(111, 240, 165, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(111, 240, 165, 0); }
        }

        .admin-icon i {
            font-size: 30px;
            color: var(--night-dark);
        }

        .catalog-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .catalog-header p {
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.8;
            margin: 0;
        }

        /* Сетка для пунктов меню - УМЕНЬШЕННАЯ */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        /* Карточка пункта меню - УМЕНЬШЕННАЯ */
        .catalog-item {
            background: rgba(37, 39, 43, 0.9);
            border-radius: 14px;
            padding: 18px 15px;
            text-align: center;
            transition: all var(--transition-normal);
            cursor: pointer;
            border: 1px solid rgba(111, 240, 165, 0.2);
            text-decoration: none;
            display: block;
        }

        .catalog-item:hover {
            transform: translateY(-3px);
            border-color: var(--neon-green);
            box-shadow: var(--shadow-neon);
            background: rgba(37, 39, 43, 0.95);
        }

        .catalog-icon {
            width: 50px;
            height: 50px;
            background: rgba(111, 240, 165, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            transition: all var(--transition-normal);
        }

        .catalog-item:hover .catalog-icon {
            background: rgba(111, 240, 165, 0.2);
            transform: scale(1.08);
        }

        .catalog-icon i {
            font-size: 24px;
            color: var(--neon-green);
        }

        .catalog-item h3 {
            font-size: 1rem;
            margin-bottom: 5px;
            color: var(--white);
        }

        .catalog-item p {
            font-size: 0.75rem;
            color: var(--off-white);
            opacity: 0.7;
            margin: 0;
        }

        /* Кнопка выхода - УМЕНЬШЕННАЯ */
        .logout-section {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(111, 240, 165, 0.2);
        }

        .logout-btn {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 25px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition-normal);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .catalog-container {
                padding: 25px 20px;
                margin: 15px;
            }

            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .catalog-header h1 {
                font-size: 1.3rem;
            }

            .catalog-item {
                padding: 15px 12px;
            }
        }

        @media (max-width: 480px) {
            .catalog-container {
                padding: 20px 15px;
            }

            .admin-icon {
                width: 55px;
                height: 55px;
            }

            .admin-icon i {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
<!-- Фоновые элементы как на других страницах -->
<div class="bg-blur-circle bg-circle-1"></div>
<div class="bg-blur-circle bg-circle-2"></div>
<div class="bg-blur-circle bg-circle-3"></div>
<div class="bg-blur-circle bg-circle-4"></div>
<div class="stars" id="stars"></div>
<div class="soft-glow"></div>

<div class="catalog-container">
    <div class="catalog-header">
        <div class="admin-icon">
            <i class="fas fa-cog"></i>
        </div>
        <h1>Панель управления</h1>
        <p>Управление данными интернет-магазина</p>
    </div>

    <div class="catalog-grid">
        <a href="/users" class="catalog-item">
            <div class="catalog-icon">
                <i class="fas fa-users"></i>
            </div>
            <h3>Пользователи</h3>
            <p>Управление учетными записями</p>
        </a>

        <a href="/category" class="catalog-item">
            <div class="catalog-icon">
                <i class="fas fa-tags"></i>
            </div>
            <h3>Категории товаров</h3>
            <p>Добавление и редактирование</p>
        </a>

        <a href="/products" class="catalog-item">
            <div class="catalog-icon">
                <i class="fas fa-boxes"></i>
            </div>
            <h3>Товары</h3>
            <p>Управление ассортиментом</p>
        </a>

        <a href="/reviews" class="catalog-item">
            <div class="catalog-icon">
                <i class="fas fa-star"></i>
            </div>
            <h3>Отзывы</h3>
            <p>Модерация отзывов</p>
        </a>

        <a href="/orders" class="catalog-item">
            <div class="catalog-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h3>Заказы</h3>
            <p>Управление заказами</p>
        </a>
    </div>

    <div class="logout-section">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Выйти из системы
            </button>
        </form>
    </div>
</div>

<script>
    // Создание мерцающих звездочек
    function createStars() {
        const container = document.getElementById('stars');
        if (!container) return;

        const starCount = 120;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            const size = Math.random();
            if (size < 0.6) {
                star.className = 'star';
            } else if (size < 0.9) {
                star.className = 'star star-medium';
            } else {
                star.className = 'star star-large';
            }
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = 2 + Math.random() * 4 + 's';
            container.appendChild(star);
        }
    }

    // Добавляем фоновые круги
    function addBackgroundCircles() {
        if (!document.querySelector('.bg-circle-1')) {
            const circles = [
                { className: 'bg-circle-1', size: 600, top: -200, left: -200 },
                { className: 'bg-circle-2', size: 550, bottom: -150, right: -150 },
                { className: 'bg-circle-3', size: 450, top: '60%', left: '10%' },
                { className: 'bg-circle-4', size: 500, bottom: '20%', right: '20%' }
            ];

            circles.forEach(circle => {
                const div = document.createElement('div');
                div.className = `bg-blur-circle ${circle.className}`;
                if (circle.size) div.style.width = `${circle.size}px`;
                if (circle.size) div.style.height = `${circle.size}px`;
                if (circle.top) div.style.top = circle.top;
                if (circle.left) div.style.left = circle.left;
                if (circle.bottom) div.style.bottom = circle.bottom;
                if (circle.right) div.style.right = circle.right;
                document.body.appendChild(div);
            });
        }

        if (!document.querySelector('.soft-glow')) {
            const glow = document.createElement('div');
            glow.className = 'soft-glow';
            document.body.appendChild(glow);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        createStars();
        addBackgroundCircles();
    });
</script>
</body>
</html>
